<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Figure 2 – Positionnement Relatif</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    .container {
      width: 360px;
      height: 290px;
    }

    .box {
      position: relative;
      width: 130px;
      height: 120px;
      border: 2px solid #5b7fa6;
    }

    .rose  { background-color: #e8a0a0; top: 0px;    left: 0px;   }
    .beige { background-color: #c8b98a; top: -50px;  left: 110px; }
    .bleu  { background-color: #6d9ed4; top: -100px; left: 220px; }
  </style>
</head>
<body>

  <h2>Figure 2 – Positionnement Relatif</h2>

  <div class="container">
    <div class="box rose"></div>
    <div class="box beige"></div>
    <div class="box bleu"></div>
  </div>

</body>
</html>
