<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Figure 1 – Positionnement Relatif</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    .container {
      width: 200px;
    }

    .box {
      position: relative;
      width: 180px;
      height: 100px;
      border: 2px solid #5b7fa6;
      margin-bottom: 15px;
    }

    .rose  { background-color: #e8a0a0; }
    .beige { background-color: #c8b98a; }
    .bleu  { background-color: #6d9ed4; }
  </style>
</head>
<body>

  <h2>Figure 1 – Positionnement Relatif</h2>

  <div class="container">
    <div class="box rose"></div>
    <div class="box beige"></div>
    <div class="box bleu"></div>
  </div>

</body>
</html>
