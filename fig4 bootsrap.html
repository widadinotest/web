<html lang="fr">
<head>

  </style>
</head>
<body class="p-4">

  <h2>Figure 4 – Bootstrap</h2>

  <div style="width: 290px;">

    <!-- Ligne 1 : rose + bleu -->
    <div class="row g-2 mb-2">
      <div class="col-6">
        <div class="rose"></div>
      </div>
      <div class="col-6">
        <div class="bleu"></div>
      </div>
    </div>

    <!-- Ligne 2 : beige + vide -->
    <div class="row g-2">
      <div class="col-6">
        <div class="beige"></div>
      </div>
      <div class="col-6">
      </div>
    </div>

  </div>

</body>
</html>
