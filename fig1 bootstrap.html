<!DOCTYPE html>
<html lang="fr">
<head>

  <title>Figure 1 – Bootstrap</title>

  <style>
    .box {
      height: 100px;
      border: 2px solid #5b7fa6;
    }
    .rose  { background-color: #e8a0a0; }
    .beige { background-color: #c8b98a; }
    .bleu  { background-color: #6d9ed4; }
  </style>
</head>
<body class="p-4">

  <h2>Figure 1 – Bootstrap</h2>

  <div class="d-flex flex-column gap-3" style="width: 200px;">
    <div class="box rose"></div>
    <div class="box beige"></div>
    <div class="box bleu"></div>
  </div>

</body>
</html>
