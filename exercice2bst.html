<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercice 2 – Bootstrap</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    .header { background-color: #6d9ed4; color: white; border: 2px solid #5b7fa6; }
    .footer { background-color: #9988bb; color: white; border: 2px solid #776699; }
    .s0     { background-color: #c8b98a; color: #333;  border: 2px solid #a09070; }
    .s1     { background-color: #d0d8f0; color: #333;  border: 2px solid #8899cc; }
    .s2     { background-color: #e8c0c0; color: #333;  border: 2px solid #cc8888; }
    .s3     { background-color: #c8ddb0; color: #333;  border: 2px solid #88aa66; }
    .s4     { background-color: #f0d8b0; color: #333;  border: 2px solid #cc9966; }
    .s5     { background-color: #00ccee; color: white; border: 2px solid #00aacc; }
    .s6     { background-color: #00ccee; color: white; border: 2px solid #00aacc; }

    .section-mid {
      padding: 50px 10px;
      text-align: center;
      font-weight: bold;
      font-size: 1.1em;
    }

    .section-full {
      padding: 25px 15px;
      text-align: center;
      font-weight: bold;
      font-size: 1.1em;
    }

  </style>
</head>
<body class="p-3 bg-light">

  <div class="container-fluid" style="max-width: 960px;">

    <div class="row mb-2">
      <div class="col-12">
        <div class="header section-full">En-tête de page</div>
      </div>
    </div>

    <div class="row mb-2">
      <div class="col-12">
        <div class="s0 section-full">Section 0</div>
      </div>
    </div>

    <div class="row g-2 mb-2">
      <div class="col-12 col-sm-6 col-md-3">
        <div class="s1 section-mid">Section 1</div>
      </div>
      <div class="col-12 col-sm-6 col-md-3">
        <div class="s2 section-mid">Section 2</div>
      </div>
      <div class="col-12 col-sm-6 col-md-3">
        <div class="s3 section-mid">Section 3</div>
      </div>
      <div class="col-12 col-sm-6 col-md-3">
        <div class="s4 section-mid">Section 4</div>
      </div>
    </div>

    <div class="row g-2 mb-2">
      <div class="col-12 col-md-6">
        <div class="s5 section-mid">Section 5</div>
      </div>
      <div class="col-12 col-md-6">
        <div class="s6 section-mid">Section 6</div>
      </div>
    </div>

    <div class="row">
      <div class="col-12">
        <div class="footer section-full">Pied de page</div>
      </div>
    </div>

  </div>

</body>
</html>
